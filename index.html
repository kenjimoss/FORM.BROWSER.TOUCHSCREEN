<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Browser - Window View</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Tab template -->
  <template id="tab-template">
    <div class="tab-window">
      <div class="tab-header">
        <div class="tab-title">New Tab</div>
        <button class="tab-close">×</button>
      </div>
      <div class="tab-content">
        <webview class="tab-webview" nodeintegration></webview>
      </div>
    </div>
  </template>
</head>
<body>
  <div class="browser-container">
    <!-- Toolbar at the top -->
    <div class="toolbar">
      <button id="new-tab-btn" class="toolbar-btn" title="New Tab">+</button>
      <div class="url-bar-container">
        <input type="text" id="url-input" placeholder="Enter URL or search...">
        <button id="go-btn" class="toolbar-btn">Go</button>
      </div>
      <div class="shape-picker" id="shape-picker">
        <button class="shape-btn" data-shape="circle"    title="Circle">⬤</button>
        <button class="shape-btn" data-shape="rounded"   title="Rounded">▢</button>
        <button class="shape-btn" data-shape="triangle"  title="Triangle">▲</button>
        <button class="shape-btn" data-shape="rectangle" title="Rectangle">▬</button>
        <button class="shape-btn" data-shape="pentagon"  title="Pentagon">⬠</button>
        <button class="shape-btn" data-shape="hexagon"   title="Hexagon">⬡</button>
      </div>
      <div class="window-controls">
        <button id="win-minimize" class="win-ctrl-btn" title="Minimize">&#x2013;</button>
        <button id="win-maximize" class="win-ctrl-btn" title="Maximize">&#x25A1;</button>
        <button id="win-close" class="win-ctrl-btn win-ctrl-close" title="Close">&#x2715;</button>
      </div>
    </div>
    
    <!-- Full workspace where tab windows can be moved -->
    <div class="workspace" id="workspace">
      <div id="desktop-blur-bg"></div>
      <!-- Pan layer: translateX/Y applied here for two-finger pan -->
      <div id="ws-content"></div>
    </div>
  </div>
  
  <!-- App window resize handles (8 edges/corners) -->
  <div id="win-resize-handles">
    <div class="win-resize-handle" data-dir="n"></div>
    <div class="win-resize-handle" data-dir="ne"></div>
    <div class="win-resize-handle" data-dir="e"></div>
    <div class="win-resize-handle" data-dir="se"></div>
    <div class="win-resize-handle" data-dir="s"></div>
    <div class="win-resize-handle" data-dir="sw"></div>
    <div class="win-resize-handle" data-dir="w"></div>
    <div class="win-resize-handle" data-dir="nw"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
